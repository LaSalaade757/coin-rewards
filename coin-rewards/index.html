<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coin Rewards</title>

    <meta name="theme-color" content="#2b1a0d">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="app">

<header class="header">

    <div class="logo">

        <h1>COIN REWARDS</h1>

        <span>🎀 DAILY REWARDS</span>

    </div>

    <p>
        Tours & pièces gratuits chaque jour
    </p>

</header>

<section class="search">

    <input
    id="searchInput"
    type="text"
    placeholder="Ex : 80 tours, 3M pièces...">

</section>

<section class="filters">

<button class="filter active">

Tous

</button>

<button class="filter">

🎰 Tours

</button>

<button class="filter">

🪙 Pièces

</button>

</section>

<div id="pageTitle"></div>

<main id="cards"></main>

<nav class="bottomBar">

<button class="active" data-page="home">

🏠

</button>

<button data-page="history">

🕒

</button>

<button data-page="stats">

📊

</button>

<button data-page="more">

⚙️

</button>

</nav>

</div>

<script src="app.js"></script>

</body>

</html>
